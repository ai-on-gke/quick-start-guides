# Corrected ClusterRole for kuberay-operator.
#
# Changes from the addon-installed default:
#   - pods/proxy: removed patch and update (get retained for dashboard proxying)
#   - pods/status: removed create and delete (patch/update sufficient for status reporting)
#   - services/proxy: removed create, patch, update (get retained for head-service proxying)
#   - services/status: removed entirely (set by cloud provider, not by the operator)
#   - coordination.k8s.io/leases: scoped update to resourceName "kuberay-operator" to
#     satisfy the Shipshape "must specify resourceName" policy rule
#
# Apply after the GKE Ray Addon installs the ClusterRole to enforce tighter permissions:
#   kubectl apply -f security_test/rbac-patches/kuberay-operator-clusterrole.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuberay-operator
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/proxy"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["services/proxy"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Lease create is unrestricted; mutating ops are scoped to the named leader-election lease.
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "list", "watch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  resourceNames: ["kuberay-operator"]
  verbs: ["patch", "update", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["ray.io"]
  resources: ["rayclusters", "rayjobs", "rayservices"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["ray.io"]
  resources: ["rayclusters/finalizers", "rayjobs/finalizers", "rayservices/finalizers"]
  verbs: ["update"]
- apiGroups: ["ray.io"]
  resources: ["rayclusters/status", "rayjobs/status", "rayservices/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings", "roles"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
